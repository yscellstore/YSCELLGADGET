<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Dashboard - YSCELLGADGET CMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b0d1a 0%, #13172b 100%);
            color: #f0f3ff;
            overflow-x: hidden;
        }

        .admin-nav {
            background: rgba(10, 15, 27, 0.95);
            backdrop-filter: blur(12px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0acf83;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-logo {
            font-size: 1.6rem;
            font-weight: bold;
            background: linear-gradient(135deg, #0acf83, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .admin-logo i {
            color: #0acf83;
            margin-right: 8px;
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-badge {
            background: rgba(10, 207, 131, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }

        .view-site-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }

        .view-site-btn:hover {
            background: #2563eb;
        }

        .dashboard-container {
            display: flex;
            min-height: calc(100vh - 70px);
        }

        .sidebar {
            width: 280px;
            background: rgba(5, 7, 15, 0.8);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(10, 207, 131, 0.2);
            padding: 2rem 1rem;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 0.5rem;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.3s;
            cursor: pointer;
        }

        .sidebar-menu a i {
            width: 24px;
            font-size: 1.2rem;
        }

        .sidebar-menu a:hover {
            background: rgba(10, 207, 131, 0.1);
            color: #0acf83;
        }

        .sidebar-menu a.active {
            background: linear-gradient(135deg, rgba(10, 207, 131, 0.2), rgba(59, 130, 246, 0.1));
            color: #0acf83;
            border-left: 3px solid #0acf83;
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(10, 207, 131, 0.2);
            transition: 0.3s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #0acf83;
        }

        .stat-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #0acf83;
            margin: 0.5rem 0;
        }

        .stat-icon {
            font-size: 2rem;
            color: #3b82f6;
            float: right;
        }

        .section-panel {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(10, 207, 131, 0.15);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .panel-header h2 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-add {
            background: #0acf83;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: #0a0f1a;
        }

        .btn-add:hover {
            background: #08b36f;
            transform: scale(1.02);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .data-table {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            color: #0acf83;
            font-weight: 600;
        }

        td img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 10px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 5px 12px;
            border-radius: 8px;
            transition: 0.2s;
            font-weight: 500;
        }

        .action-btn.edit {
            background: #3b82f6;
            color: white;
        }

        .action-btn.edit:hover {
            background: #2563eb;
            transform: scale(1.02);
        }

        .action-btn.delete {
            background: #ef4444;
            color: white;
        }

        .action-btn.delete:hover {
            background: #dc2626;
            transform: scale(1.02);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            max-width: 600px;
            width: 90%;
            border-radius: 28px;
            padding: 2rem;
            border: 1px solid #0acf83;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close-modal {
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-modal:hover {
            color: #0acf83;
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(10, 207, 131, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #0acf83;
        }

        .submit-btn {
            background: #0acf83;
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            margin-top: 1rem;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0acf83;
            color: #0a0f1a;
            padding: 1rem 2rem;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1100;
            font-weight: bold;
        }

        .toast.show {
            transform: translateX(0);
        }

        .image-preview {
            margin-top: 10px;
            max-width: 100%;
            border-radius: 12px;
            display: none;
        }

        .image-preview img {
            max-width: 100%;
            border-radius: 12px;
            border: 1px solid #0acf83;
        }

        .search-bar {
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(10, 207, 131, 0.3);
            border-radius: 30px;
            color: white;
        }

        .rating-stars {
            color: #ffc107;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                padding: 1rem;
            }
            .sidebar-menu {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .sidebar-menu li {
                margin-bottom: 0;
            }
            .sidebar-menu a {
                padding: 8px 16px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<nav class="admin-nav">
    <div class="admin-logo">
        <i class="fas fa-crown"></i> YSCellGadget Admin
    </div>
    <div class="admin-info">
        <span class="admin-badge"><i class="fas fa-user-shield"></i> <span id="adminUsername">Admin</span></span>
        <span class="admin-badge"><i class="fas fa-clock"></i> <span id="sessionTime"></span></span>
        <button class="view-site-btn" id="viewSiteBtn"><i class="fas fa-external-link-alt"></i> Website</button>
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</nav>

<div class="dashboard-container">
    <aside class="sidebar">
        <ul class="sidebar-menu">
            <li><a href="#" data-section="dashboard" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li><a href="#" data-section="news"><i class="fas fa-newspaper"></i> Kelola Berita</a></li>
            <li><a href="#" data-section="review"><i class="fas fa-star"></i> Kelola Review</a></li>
            <li><a href="#" data-section="trend"><i class="fas fa-chart-line"></i> Kelola Tren</a></li>
            <li><a href="#" data-section="backup"><i class="fas fa-database"></i> Backup & Restore</a></li>
            <li><a href="#" data-section="settings"><i class="fas fa-cog"></i> Pengaturan</a></li>
            <li><a href="#" data-section="help"><i class="fas fa-question-circle"></i> Bantuan</a></li>
        </ul>
    </aside>

    <main class="main-content" id="mainAdminContent">
        <div style="text-align: center; padding: 2rem;">
            <i class="fas fa-spinner fa-pulse fa-2x"></i>
            <p>Loading...</p>
        </div>
    </main>
</div>

<div id="itemModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Tambah Item Baru</h3>
            <span class="close-modal">&times;</span>
        </div>
        <form id="itemForm">
            <input type="hidden" id="itemId">
            <input type="hidden" id="itemType">
            <div class="form-group">
                <label>Judul / Nama</label>
                <input type="text" id="formTitle" required>
            </div>
            <div class="form-group">
                <label>Deskripsi Singkat</label>
                <textarea id="formDesc" required></textarea>
            </div>
            <div class="form-group">
                <label>Konten Detail</label>
                <textarea id="formDetail" required></textarea>
            </div>
            <div class="form-group">
                <label>URL Gambar</label>
                <input type="text" id="formImage" placeholder="https://...">
                <div class="image-preview" id="imagePreview"></div>
            </div>
            <div class="form-group" id="ratingGroup" style="display:none;">
                <label>Rating (1-5)</label>
                <input type="number" id="formRating" step="0.1" min="1" max="5" value="4">
            </div>
            <div class="form-group" id="trendNumberGroup" style="display:none;">
                <label>Angka Tren</label>
                <input type="text" id="formTrendNumber" placeholder="+245%">
            </div>
            <div class="form-group" id="trendIconGroup" style="display:none;">
                <label>Icon Font Awesome</label>
                <input type="text" id="formTrendIcon" placeholder="fas fa-robot">
            </div>
            <button type="submit" class="submit-btn">Simpan</button>
        </form>
    </div>
</div>

<div id="toast" class="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage">Berhasil!</span>
</div>

<script>
    // ==================== SESSION CHECK ====================
    function checkAuth() {
        const isLoggedIn = sessionStorage.getItem('admin_logged_in');
        const loginTime = sessionStorage.getItem('admin_login_time');
        
        if (!isLoggedIn || isLoggedIn !== 'true') {
            window.location.href = 'admin-login.html';
            return false;
        }
        
        if (loginTime && (new Date().getTime() - parseInt(loginTime)) > 8 * 60 * 60 * 1000) {
            sessionStorage.clear();
            window.location.href = 'admin-login.html';
            return false;
        }
        return true;
    }
    
    if (!checkAuth()) throw new Error('Unauthorized');
    
    // Tampilkan username
    const adminUser = sessionStorage.getItem('admin_username') || 'Admin';
    document.getElementById('adminUsername').innerHTML = `<i class="fas fa-user"></i> ${adminUser}`;
    
    // Update session time
    function updateSessionTime() {
        const loginTime = parseInt(sessionStorage.getItem('admin_login_time'));
        if (loginTime) {
            const elapsed = Math.floor((new Date().getTime() - loginTime) / 1000);
            const hours = Math.floor(elapsed / 3600);
            const minutes = Math.floor((elapsed % 3600) / 60);
            document.getElementById('sessionTime').innerHTML = `<i class="fas fa-hourglass-half"></i> ${hours}h ${minutes}m`;
        }
    }
    updateSessionTime();
    setInterval(updateSessionTime, 60000);
    
    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
        sessionStorage.clear();
        window.location.href = 'admin-login.html';
    });
    
    document.getElementById('viewSiteBtn').addEventListener('click', () => {
        window.open('index.html', '_blank');
    });
    
    // ==================== DATA LENGKAP ====================
    const defaultNews = [
        { id: 1, title: "Oppo Find X9 ULTRA: Kamera 200MP", desc: "Oppo memamerkan teknologi kamera profesional.", detail: "Oppo Find X9 ULTRA hadir dengan layar LTPO AMOLED, 1B colors, 144Hz, Dolby Vision.", image: "https://cdn.phototourl.com/free/2026-06-01-86b46fc7-b0fa-4595-9d68-3ac98be05d51.webp" },
        { id: 2, title: "Google Pixel 10: AI Generatif", desc: "Google Tensor G5, Android 16", detail: "Tensor G5 chip, kamera 48MP, fitur AI Gemini.", image: "https://cdn.phototourl.com/free/2026-06-01-911eae52-efe6-4294-ae22-5419c45c83dc.jpg" },
        { id: 3, title: "SAMSUNG S26 ULTRA", desc: "GALAXY AI TERGACOR", detail: "Snapdragon 8 Elite Gen 5, Kamera 200MP", image: "https://cdn.phototourl.com/free/2026-06-01-24bb9481-7362-4d99-b053-f9963c2b995c.jpg" },
        { id: 4, title: "ROG Phone 8", desc: "Gaming 165Hz", detail: "RAM 12GB, baterai 6000 mAh", image: "https://cdn.phototourl.com/free/2026-06-01-6230cd9c-2423-4295-a986-af54d8c303a3.webp" },
        { id: 5, title: "VIVO X300", desc: "Kamera ZEISS", detail: "Dimensity 9500, kamera 200MP", image: "https://cdn.phototourl.com/free/2026-06-01-616b11b4-2938-44c6-9628-4facb3432945.jpg" },
        { id: 6, title: "VIVO X300 PRO", desc: "Fotografi ZEISS", detail: "Layar LTPO 120Hz, baterai 6510 mAh", image: "https://cdn.phototourl.com/free/2026-06-01-e13c30ee-1312-4151-b5bf-438731876565.png" },
        { id: 7, title: "VIVO X300 ULTRA", desc: "Flagship Terbaik", detail: "Snapdragon 8 Elite Gen 5", image: "https://cdn.phototourl.com/free/2026-06-01-3526ba5d-1c9e-4dc7-b3d5-e78b329610e4.jpg" },
        { id: 8, title: "HUAWEI PURA 90", desc: "Layar OLED", detail: "RAM 12GB, kamera 50MP", image: "https://cdn.phototourl.com/free/2026-06-01-e046dd64-2c64-4fca-93db-8f749f31deff.webp" },
        { id: 9, title: "HUAWEI PURA 90 PRO", desc: "Kirin 9030S", detail: "Kamera 50MP+12.5MP+50MP", image: "https://cdn.phototourl.com/free/2026-06-01-416029e7-bd6d-4482-8693-c49c10789891.png" },
        { id: 10, title: "HUAWEI PURA 90 PRO MAX", desc: "Kamera 200MP", detail: "Kamera 50MP+40MP+200MP", image: "https://cdn.phototourl.com/free/2026-06-01-416029e7-bd6d-4482-8693-c49c10789891.png" }
    ];

    const defaultReviews = [
        { id: 1, title: "Review Samsung Galaxy S26 Ultra", rating: 4.8, review: "Kamera 200MP luar biasa jernih", detail: "Baterai tahan 1 hari", image: "https://placehold.co/400x250/1a1a2e/0acf83?text=Samsung" },
        { id: 2, title: "Review iPhone 17 Pro Max", rating: 4.9, review: "A19 Bionic gila cepat", detail: "iOS 26 dengan AI", image: "https://placehold.co/400x250/16213e/f4a261?text=iPhone" },
        { id: 3, title: "Review Xiaomi 17 Ultra", rating: 4.7, review: "Kamera Leica 1 inci", detail: "Snapdragon 8 elite", image: "https://placehold.co/400x250/0f3460/e94560?text=Xiaomi" }
    ];

    const defaultTrends = [
        { id: 1, icon: "fas fa-robot", title: "AI On-Device", number: "+245%", desc: "AI di chip HP tanpa cloud" },
        { id: 2, icon: "fas fa-folder-open", title: "Ponsel Lipat 3", number: "12 Model", desc: "Layar lipat tiga" },
        { id: 3, icon: "fas fa-charging-station", title: "Wireless 100W", number: "10 Menit", desc: "Isi daya cepat" },
        { id: 4, icon: "fas fa-shield-alt", title: "Quantum Security", number: "100%", desc: "Enkripsi quantum" }
    ];

    let newsItems = JSON.parse(localStorage.getItem('yscellgadget_news')) || JSON.parse(JSON.stringify(defaultNews));
    let reviewItems = JSON.parse(localStorage.getItem('yscellgadget_reviews')) || JSON.parse(JSON.stringify(defaultReviews));
    let trendItems = JSON.parse(localStorage.getItem('yscellgadget_trends')) || JSON.parse(JSON.stringify(defaultTrends));
    
    let currentSearch = '';
    let currentSection = 'dashboard';

    function saveAllData() {
        localStorage.setItem('yscellgadget_news', JSON.stringify(newsItems));
        localStorage.setItem('yscellgadget_reviews', JSON.stringify(reviewItems));
        localStorage.setItem('yscellgadget_trends', JSON.stringify(trendItems));
        showToast('✅ Data tersimpan! Website akan update otomatis');
    }

    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        toastMessage.innerText = message;
        toast.style.background = isError ? '#ef4444' : '#0acf83';
        toast.style.color = isError ? 'white' : '#0a0f1a';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
        setTimeout(() => { toast.style.background = '#0acf83'; }, 3100);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ==================== DASHBOARD ====================
    function renderDashboard() {
        const container = document.getElementById('mainAdminContent');
        container.innerHTML = `
            <div class="stats-grid">
                <div class="stat-card" onclick="loadSection('news')">
                    <div class="stat-title">Total Berita</div>
                    <div class="stat-number">${newsItems.length}</div>
                    <i class="fas fa-newspaper stat-icon"></i>
                </div>
                <div class="stat-card" onclick="loadSection('review')">
                    <div class="stat-title">Total Review</div>
                    <div class="stat-number">${reviewItems.length}</div>
                    <i class="fas fa-star stat-icon"></i>
                </div>
                <div class="stat-card" onclick="loadSection('trend')">
                    <div class="stat-title">Total Tren</div>
                    <div class="stat-number">${trendItems.length}</div>
                    <i class="fas fa-chart-line stat-icon"></i>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Total Konten</div>
                    <div class="stat-number">${newsItems.length + reviewItems.length + trendItems.length}</div>
                    <i class="fas fa-database stat-icon"></i>
                </div>
            </div>
            <div class="section-panel">
                <h2><i class="fas fa-chart-pie"></i> Ringkasan</h2>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem;">
                    <div style="background: rgba(10,207,131,0.1); padding: 1rem; border-radius: 16px;">
                        <h3>📰 Berita</h3>
                        <p style="font-size: 2rem; color: #0acf83;">${newsItems.length}</p>
                        <small>${newsItems.filter(n => n.id <= 3).length} terbaru</small>
                    </div>
                    <div style="background: rgba(59,130,246,0.1); padding: 1rem; border-radius: 16px;">
                        <h3>⭐ Review</h3>
                        <p style="font-size: 2rem; color: #3b82f6;">${reviewItems.length}</p>
                        <small>Rating: ${(reviewItems.reduce((a,b)=>a+b.rating,0)/reviewItems.length).toFixed(1)} ★</small>
                    </div>
                    <div style="background: rgba(245,158,11,0.1); padding: 1rem; border-radius: 16px;">
                        <h3>📈 Tren</h3>
                        <p style="font-size: 2rem; color: #f59e0b;">${trendItems.length}</p>
                        <small>Topik 2026</small>
                    </div>
                </div>
            </div>
            <div class="section-panel">
                <h2><i class="fas fa-bell"></i> Info Dashboard</h2>
                <p style="margin-top: 1rem;">Selamat datang di dashboard admin YSCELLGADGET.</p>
                <div style="margin-top: 1rem; padding: 1rem; background: rgba(10,207,131,0.1); border-radius: 16px;">
                    <i class="fas fa-sync-alt"></i> Klik card di atas untuk mengelola konten!
                </div>
            </div>
        `;
    }

    // ==================== NEWS MANAGEMENT ====================
    function renderNewsTable() {
        let filtered = newsItems;

            filtered = newsItems.filter(item => 
                item.title.toLowerCase().includes(currentSearch.toLowerCase()) ||
                item.desc.toLowerCase().includes(currentSearch.toLowerCase())
            );
        }
        
        const container = document.getElementById('mainAdminContent');
        container.innerHTML = `
            <div class="section-panel">
                <div class="panel-header">
                    <h2><i class="fas fa-newspaper"></i> Daftar Berita (${filtered.length} dari ${newsItems.length})</h2>
                    <button class="btn-add" onclick="openAddModal('news')"><i class="fas fa-plus"></i> Tambah Berita</button>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="🔍 Cari berita..." value="${currentSearch}">
                    <button class="btn-add" onclick="doSearch()"><i class="fas fa-search"></i> Cari</button>
                    ${currentSearch ? '<button class="btn-add btn-warning" onclick="clearSearch()"><i class="fas fa-times"></i> Hapus</button>' : ''}
                </div>
                <div class="data-table">
                    <table>
                        <thead><tr><th>ID</th><th>Gambar</th><th>Judul</th><th>Deskripsi</th><th>Aksi</th></tr></thead>
                        <tbody>

                                <tr>
                                    <td>${item.id}</td>
                                    <td><img src="${item.image || 'https://placehold.co/50x50'}" onerror="this.src='https://placehold.co/50x50'" width="50" height="50"></td>
                                    <td><strong>${escapeHtml(item.title)}</strong></td>
                                    <td>${escapeHtml(item.desc.substring(0, 60))}${item.desc.length > 60 ? '...' : ''}</td>
                                    <td class="action-buttons">
                                        <button class="action-btn edit" onclick="openEditModal('news', ${item.id})"><i class="fas fa-edit"></i> Edit</button>
                                        <button class="action-btn delete" onclick="deleteItem('news', ${item.id})"><i class="fas fa-trash"></i> Hapus</button>

                    </table>
                </div>
            </div>
        `;
        document.getElementById('searchInput')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') doSearch(); });

    // ==================== REVIEW MANAGEMENT ====================
    function renderReviewTable() {
        let filtered = reviewItems;

            filtered = reviewItems.filter(item => 
                item.title.toLowerCase().includes(currentSearch.toLowerCase()) ||
                item.review.toLowerCase().includes(currentSearch.toLowerCase())
            );
        }
        
        const container = document.getElementById('mainAdminContent');
        container.innerHTML = `
            <div class="section-panel">
                <div class="panel-header">
                    <h2><i class="fas fa-star"></i> Daftar Review (${filtered.length} dari ${reviewItems.length})</h2>
                    <button class="btn-add" onclick="openAddModal('review')"><i class="fas fa-plus"></i> Tambah Review</button>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="🔍 Cari review..." value="${currentSearch}">
                    <button class="btn-add" onclick="doSearch()"><i class="fas fa-search"></i> Cari</button>
                    ${currentSearch ? '<button class="btn-add btn-warning" onclick="clearSearch()"><i class="fas fa-times"></i> Hapus</button>' : ''}
                </div>
                <div class="data-table">
                    <table>
                        <thead><tr><th>ID</th><th>Gambar</th><th>Judul</th><th>Rating</th><th>Review</th><th>Aksi</th></tr></thead>
                        <tbody>
                            ${filtered.map(item => `
                                <tr>
                                    <td>${item.id}</td>
                                    <td><img src="${item.image || 'https://placehold.co/50x50'}" onerror="this.src='https://placehold.co/50x50'" width="50" height="50"></td>
                                    <td><strong>${escapeHtml(item.title)}</strong></td>
                                    <td><span class="rating-stars">${'★'.repeat(Math.floor(item.rating))}</span> ${item.rating}</td>
                                    <td>${escapeHtml(item.review.substring(0, 50))}${item.review.length > 50 ? '...' : ''}</td>
                                    <td class="action-buttons">
                                        <button class="action-btn edit" onclick="openEditModal('review', ${item.id})"><i class="fas fa-edit"></i> Edit</button>
                                        <button class="action-btn delete" onclick="deleteItem('review', ${item.id})"><i class="fas fa-trash"></i> Hapus</button>
                                    </td>
                                </tr>
                            `).join('')}
                            ${filtered.length === 0 ? '<tr><td colspan="6" style="text-align:center;">Tidak ada data</td>' : ''}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        document.getElementById('searchInput')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') doSearch(); });
    }

    // ==================== TREND MANAGEMENT ====================
    function renderTrendTable() {
        let filtered = trendItems;
        if (currentSearch) {
            filtered = trendItems.filter(item => 
                item.title.toLowerCase().includes(currentSearch.toLowerCase()) ||
                item.desc.toLowerCase().includes(currentSearch.toLowerCase())
            );
        }
        
        const container = document.getElementById('mainAdminContent');
        container.innerHTML = `
            <div class="section-panel">
                <div class="panel-header">
                    <h2><i class="fas fa-chart-line"></i> Daftar Tren (${filtered.length} dari ${trendItems.length})</h2>
                    <button class="btn-add" onclick="openAddModal('trend')"><i class="fas fa-plus"></i> Tambah Tren</button>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="🔍 Cari tren..." value="${currentSearch}">
                    <button class="btn-add" onclick="doSearch()"><i class="fas fa-search"></i> Cari</button>
                    ${currentSearch ? '<button class="btn-add btn-warning" onclick="clearSearch()"><i class="fas fa-times"></i> Hapus</button>' : ''}
                </div>
                <div class="data-table">
                    <table>
                        <thead><tr><th>ID</th><th>Icon</th><th>Judul</th><th>Angka</th><th>Deskripsi</th><th>Aksi</th></tr></thead>
                        <tbody>
                            ${filtered.map(item => `
                                <tr>
                                    <td>${item.id}</td>
                                    <td><i class="${item.icon}" style="font-size:1.5rem; color:#0acf83;"></i></td>
                                    <td><strong>${escapeHtml(item.title)}</strong></td>
                                    <td><span style="color:#0acf83; font-weight:bold;">${escapeHtml(item.number)}</span></td>
                                    <td>${escapeHtml(item.desc.substring(0, 50))}${item.desc.length > 50 ? '...' : ''}</td>
                                    <td class="action-buttons">
                                        <button class="action-btn edit" onclick="openEditModal('trend', ${item.id})"><i class="fas fa-edit"></i> Edit</button>
                                        <button class="action-btn delete" onclick="deleteItem('trend', ${item.id})"><i class="fas fa-trash"></i> Hapus</button>
                                    </td>
                                </tr>
                            `).join('')}
                            ${filtered.length === 0 ? '<tr><td colspan="6" style="text-align:center;">Tidak ada data</td>' : ''}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        document.getElementById('searchInput')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') doSearch(); });
    }

    // ==================== BACKUP SECTION ====================
    function renderBackupSection() {
        const container = document.getElementById('mainAdminContent');
        container.innerHTML = `
            <div class="section-panel">
                <h2><i class="fas fa-database"></i> Backup & Restore Data</h2>
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap;">
                    <button class="btn-add" id="exportBtn"><i class="fas fa-download"></i> Export JSON</button>
                    <label class="btn-add" style="background: #3b82f6; cursor: pointer;">
                        <i class="fas fa-upload"></i> Import JSON
                        <input type="file" id="importFile" accept=".json" style="display: none;">
                    </label>
                    <button class="btn-add btn-danger" id="resetBtn"><i class="fas fa-undo-alt"></i> Reset ke Default</button>
                    <button class="btn-add btn-warning" id="clearAllBtn"><i class="fas fa-trash-alt"></i> Hapus Semua</button>
                </div>
                <div style="margin-top: 2rem; padding: 1rem; background: rgba(10,207,131,0.1); border-radius: 16px;">
                    <p><strong>📊 Statistik Data:</strong></p>
                    <ul style="margin-left: 2rem; margin-top: 0.5rem;">
                        <li>📰 Berita: ${newsItems.length} item</li>
                        <li>⭐ Review: ${reviewItems.length} item</li>
                        <li>📈 Tren: ${trendItems.length} item</li>
                    </ul>
                </div>
            </div>
        `;
        
        document.getElementById('exportBtn')?.addEventListener('click', exportData);
        document.getElementById('importFile')?.addEventListener('change', importData);
        document.getElementById('resetBtn')?.addEventListener('click', resetToDefault);
        document.getElementById('clearAllBtn')?.addEventListener('click', clearAllData);
    }

    // ==================== SETTINGS SECTION ====================
    function renderSettingsSection() {
        const container = document.getElementById('mainAdminContent');
        container.innerHTML = `
            <div class="section-panel">
                <h2><i class="fas fa-cog"></i> Pengaturan Admin</h2>
                <div style="margin-top: 1.5rem;">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" value="${adminUser}" readonly disabled style="background:rgba(0,0,0,0.2)">
                    </div>
                    <div class="form-group">
                        <label>Password Baru</label>
                        <input type="password" id="newPass" placeholder="Minimal 4 karakter">
                    </div>
                    <div class="form-group">
                        <label>Konfirmasi Password</label>
                        <input type="password" id="confirmPass" placeholder="Ketik ulang password">
                    </div>
                    <button class="btn-add" id="updatePassBtn" style="background:#3b82f6;"><i class="fas fa-key"></i> Update Password</button>
                </div>
            </div>
        `;
        document.getElementById('updatePassBtn')?.addEventListener('click', updatePassword);
    }

    // ==================== HELP SECTION ====================
    function renderHelpSection() {
        const container = document.getElementById('mainAdminContent');
        container.innerHTML = `
            <div class="section-panel">
                <h2><i class="fas fa-question-circle"></i> Bantuan</h2>
                <div style="margin-top: 1.5rem;">
                    <div style="background: rgba(10,207,131,0.1); border-radius: 16px; padding: 1rem; margin-bottom: 1rem;">
                        <h3>➕ Menambah Konten</h3>
                        <p>Klik tombol "Tambah Berita/Review/Tren", isi form, lalu simpan.</p>
                    </div>
                    <div style="background: rgba(59,130,246,0.1); border-radius: 16px; padding: 1rem; margin-bottom: 1rem;">
                        <h3>✏️ Mengedit Konten</h3>
                        <p>Klik tombol "Edit" pada item yang ingin diubah.</p>
                    </div>
                    <div style="background: rgba(239,68,68,0.1); border-radius: 16px; padding: 1rem; margin-bottom: 1rem;">
                        <h3>🗑️ Menghapus Konten</h3>
                        <p>Klik tombol "Hapus" pada item, konfirmasi untuk menghapus.</p>
                    </div>
                    <div style="background: rgba(245,158,11,0.1); border-radius: 16px; padding: 1rem;">
                        <h3>🔄 Auto-Sync</h3>
                        <p>Perubahan akan otomatis tersimpan dan website akan update dalam 3 detik.</p>
                    </div>
                </div>
            </div>
        `;
    }

    // ==================== HELPER FUNCTIONS ====================
    function doSearch() {
        currentSearch = document.getElementById('searchInput')?.value || '';
        loadSection(currentSection);
    }

    function clearSearch() {
        currentSearch = '';
        loadSection(currentSection);
    }

    function exportData() {
        const allData = { news: newsItems, reviews: reviewItems, trends: trendItems, exportDate: new Date().toISOString() };
        const dataStr = JSON.stringify(allData, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `yscellgadget_backup_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('✅ Data berhasil diexport!');
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.news) newsItems = data.news;
                if (data.reviews) reviewItems = data.reviews;
                if (data.trends) trendItems = data.trends;
                saveAllData();
                loadSection(currentSection);
                showToast('✅ Import berhasil!');
            } catch(err) { showToast('❌ File tidak valid!', true); }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    function resetToDefault() {
        if (confirm('⚠️ Reset ke default? Data saat ini akan hilang!')) {
            newsItems = JSON.parse(JSON.stringify(defaultNews));
            reviewItems = JSON.parse(JSON.stringify(defaultReviews));
            trendItems = JSON.parse(JSON.stringify(defaultTrends));
            saveAllData();
            loadSection(currentSection);
            showToast('✅ Data direset ke default!');
        }
    }

    function clearAllData() {
        if (confirm('⚠️ HAPUS SEMUA DATA? Tidak bisa dibatalkan!')) {
            if (confirm('Yakin sekali? Semua data akan hilang!')) {
                newsItems = [];
                reviewItems = [];
                trendItems = [];
                saveAllData();
                loadSection(currentSection);
                showToast('🗑️ Semua data dihapus!');
            }
        }
    }

    function updatePassword() {
        const newPass = document.getElementById('newPass')?.value;
        const confirmPass = document.getElementById('confirmPass')?.value;
        if (!newPass || newPass.length < 4) {
            showToast('⚠️ Password minimal 4 karakter!', true);
            return;
        }
        if (newPass !== confirmPass) {
            showToast('⚠️ Password tidak cocok!', true);
            return;
        }
        localStorage.setItem('admin_custom_password', newPass);
        showToast('✅ Password berhasil diubah! Login ulang.');
        setTimeout(() => {
            sessionStorage.clear();
            window.location.href = 'admin-login.html';
        }, 1500);
    }

    // ==================== CRUD OPERATIONS ====================
    window.openAddModal = function(type) {
        document.getElementById('itemType').value = type;
        document.getElementById('itemId').value = '';
        document.getElementById('formTitle').value = '';
        document.getElementById('formDesc').value = '';
        document.getElementById('formDetail').value = '';
        document.getElementById('formImage').value = '';
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('ratingGroup').style.display = type === 'review' ? 'block' : 'none';
        document.getElementById('trendNumberGroup').style.display = type === 'trend' ? 'block' : 'none';
        document.getElementById('trendIconGroup').style.display = type === 'trend' ? 'block' : 'none';
        document.getElementById('modalTitle').innerText = `Tambah ${type === 'news' ? 'Berita' : type === 'review' ? 'Review' : 'Tren'}`;
        document.getElementById('itemModal').style.display = 'flex';
        
        // Setup image preview
        const imgInput = document.getElementById('formImage');
        imgInput.oninput = function() {
            const preview = document.getElementById('imagePreview');
            if (this.value) {
                preview.innerHTML = `<img src="${this.value}" onerror="this.src='https://placehold.co/200x200/1a1a2e/0acf83?text=Invalid'" style="max-width:100%; border-radius:12px;">`;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        };
    };

    window.openEditModal = function(type, id) {
        let item;
        if (type === 'news') item = newsItems.find(i => i.id === id);
        else if (type === 'review') item = reviewItems.find(i => i.id === id);
        else item = trendItems.find(i => i.id === id);
        if (!item) return;
        
        document.getElementById('itemType').value = type;
        document.getElementById('itemId').value = id;
        document.getElementById('formTitle').value = item.title;
        document.getElementById('formDesc').value = item.desc || item.review || '';
        document.getElementById('formDetail').value = item.detail || '';
        document.getElementById('formImage').value = item.image || '';
        
        if (item.image) {
            document.getElementById('imagePreview').innerHTML = `<img src="${item.image}" onerror="this.src='https://placehold.co/200x200/1a1a2e/0acf83?text=Invalid'" style="max-width:100%; border-radius:12px;">`;
            document.getElementById('imagePreview').style.display = 'block';
        }
        
        if (type === 'review') {
            document.getElementById('formRating').value = item.rating || 4;
            document.getElementById('ratingGroup').style.display = 'block';
        }
        if (type === 'trend') {
            document.getElementById('formTrendNumber').value = item.number || '';
            document.getElementById('formTrendIcon').value = item.icon || 'fas fa-robot';
            document.getElementById('trendNumberGroup').style.display = 'block';
            document.getElementById('trendIconGroup').style.display = 'block';
        }
        
        document.getElementById('modalTitle').innerText = `Edit ${type === 'news' ? 'Berita' : type === 'review' ? 'Review' : 'Tren'}`;
        document.getElementById('itemModal').style.display = 'flex';
        
        const imgInput = document.getElementById('formImage');
        imgInput.oninput = function() {
            const preview = document.getElementById('imagePreview');
            if (this.value) {
                preview.innerHTML = `<img src="${this.value}" onerror="this.src='https://placehold.co/200x200/1a1a2e/0acf83?text=Invalid'" style="max-width:100%; border-radius:12px;">`;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        };
    };

    window.deleteItem = function(type, id) {
        if (confirm('Yakin ingin menghapus item ini?')) {
            if (type === 'news') newsItems = newsItems.filter(i => i.id !== id);
            else if (type === 'review') reviewItems = reviewItems.filter(i => i.id !== id);
            else trendItems = trendItems.filter(i => i.id !== id);
            saveAllData();
            loadSection(currentSection);
            showToast('✅ Item berhasil dihapus!');
        }
    };

    // ==================== FORM SUBMIT ====================
    document.getElementById('itemForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const type = document.getElementById('itemType').value;
        const id = parseInt(document.getElementById('itemId').value);
        const title = document.getElementById('formTitle').value;
        const desc = document.getElementById('formDesc').value;
        const detail = document.getElementById('formDetail').value;
        const image = document.getElementById('formImage').value;

        if (type === 'news') {
            if (id) {
                const index = newsItems.findIndex(i => i.id === id);
                if (index !== -1) newsItems[index] = { ...newsItems[index], title, desc, detail, image };
            } else {
                const newId = Math.max(...newsItems.map(i => i.id), 0) + 1;
                newsItems.push({ id: newId, title, desc, detail, image });
            }
        } else if (type === 'review') {
            const rating = parseFloat(document.getElementById('formRating').value) || 4;
            if (id) {
                const index = reviewItems.findIndex(i => i.id === id);
                if (index !== -1) reviewItems[index] = { ...reviewItems[index], title, review: desc, detail, image, rating };
            } else {
                const newId = Math.max(...reviewItems.map(i => i.id), 0) + 1;
                reviewItems.push({ id: newId, title, review: desc, detail, image, rating });
            }
        } else if (type === 'trend') {
            const number = document.getElementById('formTrendNumber').value;
            const icon = document.getElementById('formTrendIcon').value;
            if (id) {
                const index = trendItems.findIndex(i => i.id === id);
                if (index !== -1) trendItems[index] = { ...trendItems[index], title, desc, number, icon };
            } else {
                const newId = Math.max(...trendItems.map(i => i.id), 0) + 1;
                trendItems.push({ id: newId, title, desc, number, icon });
            }
        }
        
        saveAllData();
        loadSection(currentSection);
        document.getElementById('itemModal').style.display = 'none';
        showToast('✅ Data berhasil disimpan!');
    });

    // ==================== LOAD SECTION ====================
    window.loadSection = function(section) {
        currentSection = section;
        if (section === 'dashboard') renderDashboard();
        else if (section === 'news') renderNewsTable();
        else if (section === 'review') renderReviewTable();
        else if (section === 'trend') renderTrendTable();
        else if (section === 'backup') renderBackupSection();
        else if (section === 'settings') renderSettingsSection();
        else if (section === 'help') renderHelpSection();
        
        document.querySelectorAll('.sidebar-menu a').forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('data-section') === section) link.classList.add('active');
        });
    };

    // ==================== EVENT LISTENERS ====================
    document.querySelectorAll('.sidebar-menu a').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const section = link.getAttribute('data-section');
            loadSection(section);
        });
    });

    document.querySelectorAll('.close-modal').forEach(el => {
        el.addEventListener('click', () => document.getElementById('itemModal').style.display = 'none');
    });
    window.addEventListener('click', (e) => {
        if (e.target === document.getElementById('itemModal')) document.getElementById('itemModal').style.display = 'none';
    });

    // INIT
    loadSection('dashboard');
</script>
</body>
</html>
