<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Dashboard - YSCELLGADGET CMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b0d1a 0%, #13172b 100%);
            color: #f0f3ff;
            overflow-x: hidden;
        }

        .admin-nav {
            background: rgba(10, 15, 27, 0.95);
            backdrop-filter: blur(12px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0acf83;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-logo {
            font-size: 1.6rem;
            font-weight: bold;
            background: linear-gradient(135deg, #0acf83, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .admin-logo i {
            color: #0acf83;
            margin-right: 8px;
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-badge {
            background: rgba(10, 207, 131, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }

        .view-site-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }

        .view-site-btn:hover {
            background: #2563eb;
        }

        .dashboard-container {
            display: flex;
            min-height: calc(100vh - 70px);
        }

        .sidebar {
            width: 280px;
            background: rgba(5, 7, 15, 0.8);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(10, 207, 131, 0.2);
            padding: 2rem 1rem;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 0.5rem;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.3s;
            cursor: pointer;
        }

        .sidebar-menu a i {
            width: 24px;
            font-size: 1.2rem;
        }

        .sidebar-menu a:hover {
            background: rgba(10, 207, 131, 0.1);
            color: #0acf83;
        }

        .sidebar-menu a.active {
            background: linear-gradient(135deg, rgba(10, 207, 131, 0.2), rgba(59, 130, 246, 0.1));
            color: #0acf83;
            border-left: 3px solid #0acf83;
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(10, 207, 131, 0.2);
            transition: 0.3s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #0acf83;
        }

        .stat-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #0acf83;
            margin: 0.5rem 0;
        }

        .stat-icon {
            font-size: 2rem;
            color: #3b82f6;
            float: right;
        }

        .section-panel {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(10, 207, 131, 0.15);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .panel-header h2 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-add {
            background: #0acf83;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: #0a0f1a;
        }

        .btn-add:hover {
            background: #08b36f;
            transform: scale(1.02);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .data-table {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            color: #0acf83;
            font-weight: 600;
        }

        td img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 10px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 5px 12px;
            border-radius: 8px;
            transition: 0.2s;
            font-weight: 500;
        }

        .action-btn.edit {
            background: #3b82f6;
            color: white;
        }

        .action-btn.delete {
            background: #ef4444;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            max-width: 600px;
            width: 90%;
            border-radius: 28px;
            padding: 2rem;
            border: 1px solid #0acf83;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close-modal {
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-modal:hover {
            color: #0acf83;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(10, 207, 131, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .submit-btn {
            background: #0acf83;
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            margin-top: 1rem;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0acf83;
            color: #0a0f1a;
            padding: 1rem 2rem;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1100;
            font-weight: bold;
        }

        .toast.show {
            transform: translateX(0);
        }

        .image-preview {
            margin-top: 10px;
            max-width: 100%;
            border-radius: 12px;
            display: none;
        }

        .image-preview img {
            max-width: 100%;
            border-radius: 12px;
            border: 1px solid #0acf83;
        }

        .search-bar {
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(10, 207, 131, 0.3);
            border-radius: 30px;
            color: white;
        }

        .rating-stars {
            color: #ffc107;
        }

        .loading-spinner {
            text-align: center;
            padding: 2rem;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                padding: 1rem;
            }
            .sidebar-menu {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .sidebar-menu li {
                margin-bottom: 0;
            }
            .sidebar-menu a {
                padding: 8px 16px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<nav class="admin-nav">
    <div class="admin-logo">
        <i class="fas fa-crown"></i> YSCellGadget Admin
    </div>
    <div class="admin-info">
        <span class="admin-badge"><i class="fas fa-user-shield"></i> <span id="adminUsername">Admin</span></span>
        <span class="admin-badge"><i class="fas fa-clock"></i> <span id="sessionTime"></span></span>
        <button class="view-site-btn" id="viewSiteBtn"><i class="fas fa-external-link-alt"></i> Website</button>
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</nav>

<div class="dashboard-container">
    <aside class="sidebar">
        <ul class="sidebar-menu">
            <li><a href="#" data-section="dashboard" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li><a href="#" data-section="news"><i class="fas fa-newspaper"></i> Kelola Berita</a></li>
            <li><a href="#" data-section="review"><i class="fas fa-star"></i> Kelola Review</a></li>
            <li><a href="#" data-section="trend"><i class="fas fa-chart-line"></i> Kelola Tren</a></li>
            <li><a href="#" data-section="backup"><i class="fas fa-database"></i> Backup & Restore</a></li>
            <li><a href="#" data-section="settings"><i class="fas fa-cog"></i> Pengaturan</a></li>
        </ul>
    </aside>

    <main class="main-content" id="mainAdminContent">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-pulse fa-2x"></i>
            <p>Loading...</p>
        </div>
    </main>
</div>

<div id="itemModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Tambah Item Baru</h3>
            <span class="close-modal">&times;</span>
        </div>
        <form id="itemForm">
            <input type="hidden" id="itemId">
            <input type="hidden" id="itemType">
            <div class="form-group">
                <label>Judul / Nama</label>
                <input type="text" id="formTitle" required>
            </div>
            <div class="form-group">
                <label>Deskripsi Singkat</label>
                <textarea id="formDesc" required></textarea>
            </div>
            <div class="form-group">
                <label>Konten Detail</label>
                <textarea id="formDetail" required></textarea>
            </div>
            <div class="form-group">
                <label>URL Gambar</label>
                <input type="text" id="formImage" placeholder="https://...">
                <div class="image-preview" id="imagePreview"></div>
            </div>
            <div class="form-group" id="ratingGroup" style="display:none;">
                <label>Rating (1-5)</label>
                <input type="number" id="formRating" step="0.1" min="1" max="5" value="4">
            </div>
            <div class="form-group" id="trendNumberGroup" style="display:none;">
                <label>Angka Tren</label>
                <input type="text" id="formTrendNumber" placeholder="+245%">
            </div>
            <div class="form-group" id="trendIconGroup" style="display:none;">
                <label>Icon Font Awesome</label>
                <input type="text" id="formTrendIcon" placeholder="fas fa-robot">
            </div>
            <button type="submit" class="submit-btn">Simpan</button>
        </form>
    </div>
</div>

<div id="toast" class="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage">Berhasil!</span>
</div>

<script>
// API Configuration
const API_BASE = '/api.php'; // Sesuaikan dengan path API Anda
let authToken = sessionStorage.getItem('admin_token');
let currentSection = 'dashboard';
let currentSearch = '';

// Helper Functions
function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    toastMessage.innerText = message;
    toast.style.background = isError ? '#ef4444' : '#0acf83';
    toast.style.color = isError ? 'white' : '#0a0f1a';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

async function apiRequest(endpoint, method = 'GET', data = null) {
    const options = {
        method: method,
        headers: {
            'Content-Type': 'application/json',
            'Authorization': authToken || ''
        }
    };
    
    if (data) {
        options.body = JSON.stringify(data);
    }
    
    try {
        const response = await fetch(`${API_BASE}/${endpoint}`, options);
        const result = await response.json();
        
        if (!response.ok) {
            throw new Error(result.error || 'Request failed');
        }
        
        return result;
    } catch (error) {
        console.error('API Error:', error);
        showToast(error.message, true);
        throw error;
    }
}

// Auth Functions
async function checkAuth() {
    if (!authToken) {
        window.location.href = 'admin-login.html';
        return false;
    }
    
    try {
        const result = await apiRequest('check-session', 'POST', { token: authToken });
        if (result.success) {
            document.getElementById('adminUsername').innerHTML = `<i class="fas fa-user"></i> ${result.username}`;
            updateSessionTime();
            setInterval(updateSessionTime, 60000);
            return true;
        } else {
            throw new Error('Session expired');
        }
    } catch (error) {
        sessionStorage.clear();
        window.location.href = 'admin-login.html';
        return false;
    }
}

function updateSessionTime() {
    const loginTime = sessionStorage.getItem('admin_login_time');
    if (loginTime) {
        const elapsed = Math.floor((new Date().getTime() - parseInt(loginTime)) / 1000);
        const hours = Math.floor(elapsed / 3600);
        const minutes = Math.floor((elapsed % 3600) / 60);
        document.getElementById('sessionTime').innerHTML = `<i class="fas fa-hourglass-half"></i> ${hours}h ${minutes}m`;
    }
}

async function logout() {
    try {
        await apiRequest('logout', 'POST', { token: authToken });
    } catch (error) {}
    sessionStorage.clear();
    window.location.href = 'admin-login.html';
}

// CRUD Operations
async function loadBerita() {
    return await apiRequest('berita');
}

async function createBerita(data) {
    return await apiRequest('berita', 'POST', data);
}

async function updateBerita(id, data) {
    return await apiRequest(`berita/${id}`, 'PUT', data);
}

async function deleteBerita(id) {
    return await apiRequest(`berita/${id}`, 'DELETE');
}

async function loadReview() {
    return await apiRequest('review');
}

async function createReview(data) {
    return await apiRequest('review', 'POST', data);
}

async function updateReview(id, data) {
    return await apiRequest(`review/${id}`, 'PUT', data);
}

async function deleteReview(id) {
    return await apiRequest(`review/${id}`, 'DELETE');
}

async function loadTrend() {
    return await apiRequest('trend');
}

async function createTrend(data) {
    return await apiRequest('trend', 'POST', data);
}

async function updateTrend(id, data) {
    return await apiRequest(`trend/${id}`, 'PUT', data);
}

async function deleteTrend(id) {
    return await apiRequest(`trend/${id}`, 'DELETE');
}

async function backupData() {
    return await apiRequest('backup');
}

async function resetToDefault() {
    if (confirm('⚠️ Reset ke default? Data saat ini akan hilang!')) {
        await apiRequest('reset-default', 'POST');
        showToast('✅ Data direset ke default!');
        loadSection(currentSection);
    }
}

// Render Functions
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

async function renderDashboard() {
    const [berita, review, trend] = await Promise.all([
        loadBerita(), loadReview(), loadTrend()
    ]);
    
    const container = document.getElementById('mainAdminContent');
    container.innerHTML = `
        <div class="stats-grid">
            <div class="stat-card" onclick="loadSection('news')">
                <div class="stat-title">Total Berita</div>
                <div class="stat-number">${berita.length}</div>
                <i class="fas fa-newspaper stat-icon"></i>
            </div>
            <div class="stat-card" onclick="loadSection('review')">
                <div class="stat-title">Total Review</div>
                <div class="stat-number">${review.length}</div>
                <i class="fas fa-star stat-icon"></i>
            </div>
            <div class="stat-card" onclick="loadSection('trend')">
                <div class="stat-title">Total Tren</div>
                <div class="stat-number">${trend.length}</div>
                <i class="fas fa-chart-line stat-icon"></i>
            </div>
            <div class="stat-card">
                <div class="stat-title">Total Konten</div>
                <div class="stat-number">${berita.length + review.length + trend.length}</div>
                <i class="fas fa-database stat-icon"></i>
            </div>
        </div>
        <div class="section-panel">
            <h2><i class="fas fa-chart-pie"></i> Ringkasan</h2>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem;">
                <div style="background: rgba(10,207,131,0.1); padding: 1rem; border-radius: 16px;">
                    <h3>📰 Berita</h3>
                    <p style="font-size: 2rem; color: #0acf83;">${berita.length}</p>
                </div>
                <div style="background: rgba(59,130,246,0.1); padding: 1rem; border-radius: 16px;">
                    <h3>⭐ Review</h3>
                    <p style="font-size: 2rem; color: #3b82f6;">${review.length}</p>
                </div>
                <div style="background: rgba(245,158,11,0.1); padding: 1rem; border-radius: 16px;">
                    <h3>📈 Tren</h3>
                    <p style="font-size: 2rem; color: #f59e0b;">${trend.length}</p>
                </div>
            </div>
        </div>
    `;
}

async function renderNewsTable() {
    let items = await loadBerita();
    let filtered = items;
    
    if (currentSearch) {
        filtered = items.filter(item => 
            item.title.toLowerCase().includes(currentSearch.toLowerCase()) ||
            (item.description && item.description.toLowerCase().includes(currentSearch.toLowerCase()))
        );
    }
    
    const container = document.getElementById('mainAdminContent');
    container.innerHTML = `
        <div class="section-panel">
            <div class="panel-header">
                <h2><i class="fas fa-newspaper"></i> Daftar Berita (${filtered.length} dari ${items.length})</h2>
                <button class="btn-add" onclick="openAddModal('news')"><i class="fas fa-plus"></i> Tambah Berita</button>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Cari berita..." value="${escapeHtml(currentSearch)}">
                <button class="btn-add" onclick="doSearch()"><i class="fas fa-search"></i> Cari</button>
                ${currentSearch ? '<button class="btn-add btn-warning" onclick="clearSearch()"><i class="fas fa-times"></i> Hapus</button>' : ''}
            </div>
            <div class="data-table">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Gambar</th><th>Judul</th><th>Deskripsi</th><th>Aksi</th>
                    </thead>
                    <tbody>
                        ${filtered.map(item => `
                            <tr>
                                <td>${item.id}</td>
                                <td><img src="${item.image_url || 'https://placehold.co/50x50'}" onerror="this.src='https://placehold.co/50x50'" width="50" height="50"></td>
                                <td><strong>${escapeHtml(item.title)}</strong></td>
                                <td>${escapeHtml((item.description || '').substring(0, 60))}${(item.description || '').length > 60 ? '...' : ''}</td>
                                <td class="action-buttons">
                                    <button class="action-btn edit" onclick="openEditModal('news', ${item.id})"><i class="fas fa-edit"></i> Edit</button>
                                    <button class="action-btn delete" onclick="deleteItem('news', ${item.id})"><i class="fas fa-trash"></i> Hapus</button>
                                </td>
                            </tr>
                        `).join('')}
                        ${filtered.length === 0 ? '<tr><td colspan="5" style="text-align:center;">Tidak ada data</td></tr>' : ''}
                    </tbody>
                </table>
            </div>
        </div>
    `;
    document.getElementById('searchInput')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') doSearch(); });
}

async function renderReviewTable() {
    let items = await loadReview();
    let filtered = items;
    
    if (currentSearch) {
        filtered = items.filter(item => 
            item.title.toLowerCase().includes(currentSearch.toLowerCase()) ||
            (item.review_text && item.review_text.toLowerCase().includes(currentSearch.toLowerCase()))
        );
    }
    
    const container = document.getElementById('mainAdminContent');
    container.innerHTML = `
        <div class="section-panel">
            <div class="panel-header">
                <h2><i class="fas fa-star"></i> Daftar Review (${filtered.length} dari ${items.length})</h2>
                <button class="btn-add" onclick="openAddModal('review')"><i class="fas fa-plus"></i> Tambah Review</button>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Cari review..." value="${escapeHtml(currentSearch)}">
                <button class="btn-add" onclick="doSearch()"><i class="fas fa-search"></i> Cari</button>
                ${currentSearch ? '<button class="btn-add btn-warning" onclick="clearSearch()"><i class="fas fa-times"></i> Hapus</button>' : ''}
            </div>
            <div class="data-table">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Gambar</th><th>Judul</th><th>Rating</th><th>Review</th><th>Aksi</th>
                    </thead>
                    <tbody>
                        ${filtered.map(item => `
                            <tr>
                                <td>${item.id}</td>
                                <td><img src="${item.image_url || 'https://placehold.co/50x50'}" onerror="this.src='https://placehold.co/50x50'" width="50" height="50"></td>
                                <td><strong>${escapeHtml(item.title)}</strong></td>
                                <td><span class="rating-stars">${'★'.repeat(Math.floor(item.rating))}</span> ${item.rating}</td>
                                <td>${escapeHtml((item.review_text || '').substring(0, 50))}${(item.review_text || '').length > 50 ? '...' : ''}</td>
                                <td class="action-buttons">
                                    <button class="action-btn edit" onclick="openEditModal('review', ${item.id})"><i class="fas fa-edit"></i> Edit</button>
                                    <button class="action-btn delete" onclick="deleteItem('review', ${item.id})"><i class="fas fa-trash"></i> Hapus</button>
                                </td>
                            </tr>
                        `).join('')}
                        ${filtered.length === 0 ? '<tr><td colspan="6" style="text-align:center;">Tidak ada data</td></tr>' : ''}
                    </tbody>
                </table>
            </div>
        </div>
    `;
    document.getElementById('searchInput')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') doSearch(); });
}

async function renderTrendTable() {
    let items = await loadTrend();
    let filtered = items;
    
    if (currentSearch) {
        filtered = items.filter(item => 
            item.title.toLowerCase().includes(currentSearch.toLowerCase()) ||
            (item.description && item.description.toLowerCase().includes(currentSearch.toLowerCase()))
        );
    }
    
    const container = document.getElementById('mainAdminContent');
    container.innerHTML = `
        <div class="section-panel">
            <div class="panel-header">
                <h2><i class="fas fa-chart-line"></i> Daftar Tren (${filtered.length} dari ${items.length})</h2>
                <button class="btn-add" onclick="openAddModal('trend')"><i class="fas fa-plus"></i> Tambah Tren</button>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Cari tren..." value="${escapeHtml(currentSearch)}">
                <button class="btn-add" onclick="doSearch()"><i class="fas fa-search"></i> Cari</button>
                ${currentSearch ? '<button class="btn-add btn-warning" onclick="clearSearch()"><i class="fas fa-times"></i> Hapus</button>' : ''}
            </div>
            <div class="data-table">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Icon</th><th>Judul</th><th>Angka</th><th>Deskripsi</th><th>Aksi</th>
                    </thead>
                    <tbody>
                        ${filtered.map(item => `
                            <tr>
                                <td>${item.id}</td>
                                <td><i class="${item.icon}" style="font-size:1.5rem; color:#0acf83;"></i></td>
                                <td><strong>${escapeHtml(item.title)}</strong></td>
                                <td><span style="color:#0acf83; font-weight:bold;">${escapeHtml(item.trend_number)}</span></td>
                                <td>${escapeHtml((item.description || '').substring(0, 50))}${(item.description || '').length > 50 ? '...' : ''}</td>
                                <td class="action-buttons">
                                    <button class="action-btn edit" onclick="openEditModal('trend', ${item.id})"><i class="fas fa-edit"></i> Edit</button>
                                    <button class="action-btn delete" onclick="deleteItem('trend', ${item.id})"><i class="fas fa-trash"></i> Hapus</button>
                                </td>
                            </tr>
                        `).join('')}
                        ${filtered.length === 0 ? '<tr><td colspan="6" style="text-align:center;">Tidak ada data</td></tr>' : ''}
                    </tbody>
                </table>
            </div>
        </div>
    `;
    document.getElementById('searchInput')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') doSearch(); });
}

async function renderBackupSection() {
    const stats = await backupData();
    const container = document.getElementById('mainAdminContent');
    container.innerHTML = `
        <div class="section-panel">
            <h2><i class="fas fa-database"></i> Backup & Restore Data</h2>
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap;">
                <button class="btn-add" id="exportBtn"><i class="fas fa-download"></i> Export JSON</button>
                <label class="btn-add" style="background: #3b82f6; cursor: pointer;">
                    <i class="fas fa-upload"></i> Import JSON
                    <input type="file" id="importFile" accept=".json" style="display: none;">
                </label>
                <button class="btn-add btn-danger" id="resetBtn"><i class="fas fa-undo-alt"></i> Reset ke Default</button>
            </div>
            <div style="margin-top: 2rem; padding: 1rem; background: rgba(10,207,131,0.1); border-radius: 16px;">
                <p><strong>📊 Statistik Data:</strong></p>
                <ul style="margin-left: 2rem; margin-top: 0.5rem;">
                    <li>📰 Berita: ${stats.berita?.length || 0} item</li>
                    <li>⭐ Review: ${stats.review?.length || 0} item</li>
                    <li>📈 Tren: ${stats.trend?.length || 0} item</li>
                </ul>
            </div>
        </div>
    `;
    
    document.getElementById('exportBtn')?.addEventListener('click', () => exportData(stats));
    document.getElementById('importFile')?.addEventListener('change', importData);
    document.getElementById('resetBtn')?.addEventListener('click', resetToDefault);
}

async function renderSettingsSection() {
    const container = document.getElementById('mainAdminContent');
    container.innerHTML = `
        <div class="section-panel">
            <h2><i class="fas fa-cog"></i> Pengaturan Admin</h2>
            <div style="margin-top: 1.5rem;">
                <p style="background: rgba(10,207,131,0.1); padding: 1rem; border-radius: 16px;">
                    <i class="fas fa-info-circle"></i> Sistem menggunakan database MySQL untuk menyimpan semua data.
                    <br><br>
                    <strong>Database:</strong> yscellgadget_cms<br>
                    <strong>Tabel:</strong> berita, review, trend, admin
                </p>
            </div>
        </div>
    `;
}

function exportData(data) {
    const exportData = {
        berita: data.berita || [],
        review: data.review || [],
        trend: data.trend || [],
        exportDate: new Date().toISOString()
    };
    const dataStr = JSON.stringify(exportData, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `yscellgadget_backup_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ Data berhasil diexport!');
}

async function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const data = JSON.parse(e.target.result);
            
            if (data.berita) {
                for (const item of data.berita) {
                    await createBerita({
                        title: item.title,
                        description: item.description || item.desc,
                        detail: item.detail,
                        image_url: item.image_url || item.image
                    });
                }
            }
            if (data.review) {
                for (const item of data.review) {
                    await createReview({
                        title: item.title,
                        rating: item.rating,
                        review_text: item.review_text || item.review,
                        detail: item.detail,
                        image_url: item.image_url || item.image
                    });
                }
            }
            if (data.trend) {
                for (const item of data.trend) {
                    await createTrend({
                        icon: item.icon,
                        title: item.title,
                        trend_number: item.trend_number || item.number,
                        description: item.description || item.desc
                    });
                }
            }
            
            showToast('✅ Import berhasil!');
            loadSection(currentSection);
        } catch(err) {
            showToast('❌ File tidak valid!', true);
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

// Modal & Form Handling
window.openAddModal = function(type) {
    document.getElementById('itemType').value = type;
    document.getElementById('itemId').value = '';
    document.getElementById('formTitle').value = '';
    document.getElementById('formDesc').value = '';
    document.getElementById('formDetail').value = '';
    document.getElementById('formImage').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('ratingGroup').style.display = type === 'review' ? 'block' : 'none';
    document.getElementById('trendNumberGroup').style.display = type === 'trend' ? 'block' : 'none';
    document.getElementById('trendIconGroup').style.display = type === 'trend' ? 'block' : 'none';
    document.getElementById('modalTitle').innerText = `Tambah ${type === 'news' ? 'Berita' : type === 'review' ? 'Review' : 'Tren'}`;
    document.getElementById('itemModal').style.display = 'flex';
    
    const imgInput = document.getElementById('formImage');
    imgInput.oninput = function() {
        const preview = document.getElementById('imagePreview');
        if (this.value) {
            preview.innerHTML = `<img src="${this.value}" onerror="this.src='https://placehold.co/200x200/1a1a2e/0acf83?text=Invalid'" style="max-width:100%; border-radius:12px;">`;
            preview.style.display = 'block';
        } else {
            preview.style.display = 'none';
        }
    };
};

window.openEditModal = async function(type, id) {
    let item;
    if (type === 'news') {
        const items = await loadBerita();
        item = items.find(i => i.id === id);
    } else if (type === 'review') {
        const items = await loadReview();
        item = items.find(i => i.id === id);
    } else {
        const items = await loadTrend();
        item = items.find(i => i.id === id);
    }
    
    if (!item) return;
    
    document.getElementById('itemType').value = type;
    document.getElementById('itemId').value = id;
    document.getElementById('formTitle').value = item.title;
    document.getElementById('formDesc').value = item.description || item.review_text || '';
    document.getElementById('formDetail').value = item.detail || '';
    document.getElementById('formImage').value = item.image_url || '';
    
    if (item.image_url) {
        document.getElementById('imagePreview').innerHTML = `<img src="${item.image_url}" onerror="this.src='https://placehold.co/200x200/1a1a2e/0acf83?text=Invalid'" style="max-width:100%; border-radius:12px;">`;
        document.getElementById('imagePreview').style.display = 'block';
    }
    
    if (type === 'review') {
        document.getElementById('formRating').value = item.rating || 4;
        document.getElementById('ratingGroup').style.display = 'block';
    }
    if (type === 'trend') {
        document.getElementById('formTrendNumber').value = item.trend_number || '';
        document.getElementById('formTrendIcon').value = item.icon || 'fas fa-robot';
        document.getElementById('trendNumberGroup').style.display = 'block';
        document.getElementById('trendIconGroup').style.display = 'block';
    }
    
    document.getElementById('modalTitle').innerText = `Edit ${type === 'news' ? 'Berita' : type === 'review' ? 'Review' : 'Tren'}`;
    document.getElementById('itemModal').style.display = 'flex';
};

window.deleteItem = async function(type, id) {
    if (confirm('Yakin ingin menghapus item ini?')) {
        if (type === 'news') await deleteBerita(id);
        else if (type === 'review') await deleteReview(id);
        else await deleteTrend(id);
        showToast('✅ Item berhasil dihapus!');
        loadSection(currentSection);
    }
};

// Form Submit
document.getElementById('itemForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const type = document.getElementById('itemType').value;
    const id = parseInt(document.getElementById('itemId').value);
    const title = document.getElementById('formTitle').value;
    const desc = document.getElementById('formDesc').value;
    const detail = document.getElementById('formDetail').value;
    const image = document.getElementById('formImage').value;
    
    try {
        if (type === 'news') {
            const data = { title, description: desc, detail, image_url: image };
            if (id) await updateBerita(id, data);
            else await createBerita(data);
        } else if (type === 'review') {
            const rating = parseFloat(document.getElementById('formRating').value) || 4;
            const data = { title, rating, review_text: desc, detail, image_url: image };
            if (id) await updateReview(id, data);
            else await createReview(data);
        } else if (type === 'trend') {
            const trendNumber = document.getElementById('formTrendNumber').value;
            const icon = document.getElementById('formTrendIcon').value;
            const data = { icon, title, trend_number: trendNumber, description: desc };
            if (id) await updateTrend(id, data);
            else await createTrend(data);
        }
        
        showToast('✅ Data berhasil disimpan!');
        document.getElementById('itemModal').style.display = 'none';
        loadSection(currentSection);
    } catch (error) {
        showToast('❌ Gagal menyimpan data!', true);
    }
});

// Navigation
function doSearch() {
    currentSearch = document.getElementById('searchInput')?.value || '';
    loadSection(currentSection);
}

function clearSearch() {
    currentSearch = '';
    loadSection(currentSection);
}

window.loadSection = function(section) {
    currentSection = section;
    const container = document.getElementById('mainAdminContent');
    container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-pulse fa-2x"></i><p>Loading...</p></div>';
    
    if (section === 'dashboard') renderDashboard();
    else if (section === 'news') renderNewsTable();
    else if (section === 'review') renderReviewTable();
    else if (section === 'trend') renderTrendTable();
    else if (section === 'backup') renderBackupSection();
    else if (section === 'settings') renderSettingsSection();
    
    document.querySelectorAll('.sidebar-menu a').forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('data-section') === section) link.classList.add('active');
    });
};

// Event Listeners
document.querySelectorAll('.sidebar-menu a').forEach(link => {
    link.addEventListener('click', (e) => {
        e.preventDefault();
        const section = link.getAttribute('data-section');
        loadSection(section);
    });
});

document.querySelectorAll('.close-modal').forEach(el => {
    el.addEventListener('click', () => document.getElementById('itemModal').style.display = 'none');
});

window.addEventListener('click', (e) => {
    if (e.target === document.getElementById('itemModal')) document.getElementById('itemModal').style.display = 'none';
});

document.getElementById('logoutBtn').addEventListener('click', logout);
document.getElementById('viewSiteBtn').addEventListener('click', () => {
    window.open('index.html', '_blank');
});

// Initialize
checkAuth().then(() => {
    loadSection('dashboard');
});
</script>
</body>
</html>
