<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - YSCELLGADGET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b0d1a 0%, #13172b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2.5rem;
            border: 1px solid rgba(10, 207, 131, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-icon {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #0acf83, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }

        .login-header h1 {
            font-size: 1.8rem;
            color: #f0f3ff;
        }

        .login-header p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #0acf83;
            font-size: 1.1rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(10, 207, 131, 0.3);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #0acf83;
            box-shadow: 0 0 15px rgba(10, 207, 131, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0acf83, #08b36f);
            border: none;
            border-radius: 16px;
            color: #0a0f1a;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(10, 207, 131, 0.4);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            border-radius: 12px;
            padding: 10px;
            margin-top: 1rem;
            text-align: center;
            color: #ef4444;
            font-size: 0.85rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .footer-links {
            text-align: center;
            margin-top: 1.5rem;
        }

        .footer-links a {
            color: #0acf83;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .security-badge {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1>Admin Dashboard</h1>
                <p>YSCELLGADGET CMS</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Username" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login ke Dashboard
                </button>
                <div class="error-message" id="errorMessage">
                    <i class="fas fa-exclamation-triangle"></i> Username atau password salah!
                </div>
            </form>

            <div class="footer-links">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Kembali ke Website</a>
            </div>
            <div class="security-badge">
                <i class="fas fa-lock"></i> Secure Connection
                <i class="fas fa-database"></i> Database MySQL
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api.php';
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');
            
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    sessionStorage.setItem('admin_logged_in', 'true');
                    sessionStorage.setItem('admin_token', result.token);
                    sessionStorage.setItem('admin_username', result.username);
                    sessionStorage.setItem('admin_login_time', new Date().getTime());
                    
                    const btn = document.querySelector('.login-btn');
                    btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Redirecting...';
                    btn.disabled = true;
                    
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 500);
                } else {
                    errorMsg.classList.add('show');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                    
                    setTimeout(() => {
                        errorMsg.classList.remove('show');
                    }, 3000);
                }
            } catch (error) {
                errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Koneksi ke server gagal!';
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
            }
        });
    </script>
</body>
</html>
